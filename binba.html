<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1 class="title">Responsive Food Gallery</h1>

    <div class="gallery">

        <div class="card">
            <img src="1.jpg" alt="Pizza">
            <h2>Pizza</h2>
            <p>Delicious cheese pizza.</p>
        </div>

        <div class="card">
            <img src="2.jpg" alt="Burger">
            <h2>Burger</h2>
            <p>Tasty beef burger.</p>
        </div>

        <div class="card">
            <img src="3.jpg" alt="Pasta">
            <h2>Pasta</h2>
            <p>Italian pasta dish.</p>
        </div>

        <div class="card">
            <img src="4.jpg" alt="Tea">
            <h2>Somali Tea</h2>
            <p>Hot traditional tea.</p>
        </div>

        <div class="card">
            <img src="5.jpg" alt="Cake">
            <h2>Cake</h2>
            <p>Sweet dessert cake.</p>
        </div>

        <div class="card">
            <img src="6.jpg" alt="Juice">
            <h2>Juice</h2>
            <p>Fresh fruit juice.</p>
        </div>

        <div class="card">
            <img src="7.jpg" alt="Fries">
            <h2>Fries</h2>
            <p>Crispy potato fries.</p>
        </div>

        <div class="card">
            <img src="8.jpg" alt="Shawarma">
            <h2>Shawarma</h2>
            <p>Popular street food.</p>
        </div>

    </div>

</body>
</html>
